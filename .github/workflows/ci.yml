name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Protocol → Desktop → Mobile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22.18.0
          cache: npm
          cache-dependency-path: |
            packages/syncer-protocol/package-lock.json
            syncer-desktop/package-lock.json
            syncer-mobile/package-lock.json

      - name: Install protocol dependencies
        working-directory: packages/syncer-protocol
        run: npm ci
      - name: Typecheck protocol
        working-directory: packages/syncer-protocol
        run: npm run typecheck
      - name: Test protocol
        working-directory: packages/syncer-protocol
        run: npm test
      - name: Smoke test protocol session
        working-directory: packages/syncer-protocol
        run: node scripts/smoke-session.mjs

      - name: Install desktop dependencies
        working-directory: syncer-desktop
        run: npm ci
      - name: Lint desktop
        working-directory: syncer-desktop
        run: npm run lint
      - name: Typecheck desktop
        working-directory: syncer-desktop
        run: npm run typecheck
      - name: Build desktop
        working-directory: syncer-desktop
        run: npx electron-vite build

      - name: Install mobile dependencies
        working-directory: syncer-mobile
        run: npm ci
      - name: Validate mobile dependency graph
        working-directory: syncer-mobile
        run: npm ls --depth=1
      - name: Check Expo project health
        working-directory: syncer-mobile
        run: npx expo-doctor@latest
      - name: Resolve Expo configuration
        working-directory: syncer-mobile
        run: npx expo config --type public
      - name: Lint mobile
        working-directory: syncer-mobile
        run: npm run lint
      - name: Typecheck mobile
        working-directory: syncer-mobile
        run: npm run typecheck
      - name: Test mobile adapters and coordinators
        working-directory: syncer-mobile
        run: npm test
      - name: Bundle mobile JavaScript
        working-directory: syncer-mobile
        env:
          NODE_ENV: production
        run: npx expo export --platform android --output-dir "$RUNNER_TEMP/syncer-export"

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: gradle
      - name: Generate Android project
        working-directory: syncer-mobile
        run: npx expo prebuild --clean --platform android --no-install
      - name: Test native storage and build Android app
        working-directory: syncer-mobile/android
        env:
          NODE_ENV: production
        run: ./gradlew :syncer-storage:testDebugUnitTest :syncer-storage:lintDebug :syncer-storage:assembleRelease :app:assembleDebug --no-daemon
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Test MediaStore on Android 10
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86_64
          disable-animations: true
          script: ./syncer-mobile/android/gradlew -p syncer-mobile/android :syncer-storage:connectedDebugAndroidTest --no-daemon

  node24:
    name: JavaScript toolchain → Node 24.3
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24.3.0
          cache: npm
          cache-dependency-path: |
            packages/syncer-protocol/package-lock.json
            syncer-desktop/package-lock.json
            syncer-mobile/package-lock.json
      - name: Verify protocol
        working-directory: packages/syncer-protocol
        run: |
          npm ci
          npm run typecheck
          npm test
      - name: Verify desktop static build
        working-directory: syncer-desktop
        run: |
          npm ci
          npm run lint
          npm run typecheck
          npx electron-vite build
      - name: Verify mobile JavaScript
        working-directory: syncer-mobile
        run: |
          npm ci
          npm run lint
          npm run typecheck
          npm test

  apple:
    name: Mobile → iOS
    runs-on: macos-26
    env:
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
    steps:
      - uses: actions/checkout@v6
      - name: Select Xcode 26.4
        run: sudo xcode-select --switch /Applications/Xcode_26.4.app
      - uses: actions/setup-node@v6
        with:
          node-version: 22.18.0
          cache: npm
          cache-dependency-path: |
            packages/syncer-protocol/package-lock.json
            syncer-mobile/package-lock.json

      - name: Install protocol dependencies
        working-directory: packages/syncer-protocol
        run: npm ci
      - name: Build protocol
        working-directory: packages/syncer-protocol
        run: npm run build
      - name: Install mobile dependencies
        working-directory: syncer-mobile
        run: npm ci
      - name: Test iOS storage core
        working-directory: syncer-mobile/modules/syncer-storage
        run: swift test
      - name: Generate iOS project
        working-directory: syncer-mobile
        run: npx expo prebuild --clean --platform ios --no-install
      - name: Install iOS dependencies
        working-directory: syncer-mobile
        run: pod install --project-directory=ios
      - name: Build iOS app
        working-directory: syncer-mobile
        run: |
          xcodebuild \
            -workspace ios/Syncer.xcworkspace \
            -scheme Syncer \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath "$RUNNER_TEMP/SyncerDerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
          build

  windows:
    name: Desktop → Windows package
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22.18.0
          cache: npm
          cache-dependency-path: |
            packages/syncer-protocol/package-lock.json
            syncer-desktop/package-lock.json

      - name: Install and build protocol
        working-directory: packages/syncer-protocol
        run: |
          npm ci
          npm run build
      - name: Install desktop dependencies
        working-directory: syncer-desktop
        run: npm ci
      - name: Test desktop adapters and network integration
        working-directory: syncer-desktop
        run: npm test
      - name: Build unpacked Windows app
        working-directory: syncer-desktop
        run: npm run build:unpack
      - name: Verify packaged native dependency and startup
        working-directory: syncer-desktop
        timeout-minutes: 2
        shell: pwsh
        run: |
          $libnutModules = @(Get-ChildItem -LiteralPath 'dist\win-unpacked' -Recurse -Filter 'libnut.node')
          if ($libnutModules.Count -ne 1) {
            throw "Expected exactly one unpacked libnut.node, found $($libnutModules.Count)"
          }
          $koffiModules = @(Get-ChildItem -LiteralPath 'dist\win-unpacked' -Recurse -Filter 'koffi.node')
          if ($koffiModules.Count -ne 1) {
            throw "Expected exactly one unpacked koffi.node, found $($koffiModules.Count)"
          }
          $runnerTemp = [IO.Path]::GetFullPath($env:RUNNER_TEMP)
          $userData = [IO.Path]::GetFullPath((Join-Path $runnerTemp 'syncer-startup-smoke'))
          if (-not $userData.StartsWith($runnerTemp + [IO.Path]::DirectorySeparatorChar, [StringComparison]::OrdinalIgnoreCase)) {
            throw "Unsafe startup smoke directory: $userData"
          }
          New-Item -ItemType Directory -Path $userData | Out-Null
          $env:SYNCER_STARTUP_SMOKE = '1'
          $process = $null
          try {
            $process = Start-Process -FilePath 'dist\win-unpacked\Syncer.exe' -ArgumentList "--user-data-dir=$userData" -PassThru -WindowStyle Hidden
            if (-not $process.WaitForExit(60000)) {
              throw 'Packaged Syncer startup timed out'
            }
            if ($process.ExitCode -ne 0) {
              throw "Packaged Syncer startup failed with exit code $($process.ExitCode)"
            }
          } finally {
            if ($process -and -not $process.HasExited) {
              Stop-Process -Id $process.Id -Force
            }
            Remove-Item -LiteralPath $userData -Recurse -Force
          }

          Remove-Item Env:SYNCER_STARTUP_SMOKE
          $singleInstanceUserData = [IO.Path]::GetFullPath((Join-Path $runnerTemp 'syncer-single-instance-smoke'))
          if (-not $singleInstanceUserData.StartsWith($runnerTemp + [IO.Path]::DirectorySeparatorChar, [StringComparison]::OrdinalIgnoreCase)) {
            throw "Unsafe single-instance smoke directory: $singleInstanceUserData"
          }
          New-Item -ItemType Directory -Path $singleInstanceUserData | Out-Null
          $primary = $null
          $secondary = $null
          try {
            $arguments = "--user-data-dir=$singleInstanceUserData"
            $primary = Start-Process -FilePath 'dist\win-unpacked\Syncer.exe' -ArgumentList $arguments -PassThru -WindowStyle Hidden
            $deadline = [DateTime]::UtcNow.AddSeconds(30)
            $presenceReady = $false
            do {
              Start-Sleep -Milliseconds 100
              $primary.Refresh()
              if ($primary.HasExited) {
                throw "Primary packaged Syncer exited with code $($primary.ExitCode)"
              }
              $presenceReady = @(
                Get-NetTCPConnection -State Listen -LocalPort 5743 -ErrorAction SilentlyContinue |
                  Where-Object { $_.OwningProcess -eq $primary.Id }
              ).Count -gt 0
            } while (-not $presenceReady -and [DateTime]::UtcNow -lt $deadline)
            if (-not $presenceReady) {
              throw 'Primary packaged Syncer did not start Presence in time'
            }

            $secondary = Start-Process -FilePath 'dist\win-unpacked\Syncer.exe' -ArgumentList $arguments -PassThru -WindowStyle Hidden
            if (-not $secondary.WaitForExit(15000)) {
              throw 'Secondary packaged Syncer did not yield to the primary instance'
            }
            if ($secondary.ExitCode -ne 0) {
              throw "Secondary packaged Syncer failed with exit code $($secondary.ExitCode)"
            }
            $primary.Refresh()
            if ($primary.HasExited) {
              throw 'Primary packaged Syncer exited after the second launch'
            }
          } finally {
            if ($secondary -and -not $secondary.HasExited) {
              Stop-Process -Id $secondary.Id -Force
            }
            if ($primary -and -not $primary.HasExited) {
              Stop-Process -Id $primary.Id -Force
              Wait-Process -Id $primary.Id -ErrorAction SilentlyContinue
            }
            Remove-Item -LiteralPath $singleInstanceUserData -Recurse -Force
          }
