name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-beta.[0-9]+'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  metadata:
    name: Validate release tag
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.release.outputs.version }}
      release_channel: ${{ steps.release.outputs.release_channel }}
      prerelease: ${{ steps.release.outputs.prerelease }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.1
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.0.0
        with:
          node-version: 22.18.0

      - id: release
        name: Validate tag and project versions
        shell: bash
        run: |
          set -euo pipefail

          tag="$GITHUB_REF_NAME"
          stable_pattern='^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$'
          beta_pattern='^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)-beta\.(0|[1-9][0-9]*)$'

          if [[ "$tag" =~ $stable_pattern ]]; then
            release_channel='production'
            prerelease='false'
          elif [[ "$tag" =~ $beta_pattern ]]; then
            release_channel='beta'
            prerelease='true'
          else
            echo "Unsupported release tag: $tag" >&2
            exit 1
          fi

          version="${tag#v}"
          declared_versions=(
            "$(node -p "require('./package.json').version")"
            "$(node -p "require('./syncer-desktop/package.json').version")"
            "$(node -p "require('./syncer-mobile/package.json').version")"
            "$(node -p "require('./syncer-mobile/app.json').expo.version")"
          )

          for declared_version in "${declared_versions[@]}"; do
            if [[ "$declared_version" != "$version" ]]; then
              echo "Tag version $version does not match project version $declared_version" >&2
              exit 1
            fi
          done

          {
            echo "version=$version"
            echo "release_channel=$release_channel"
            echo "prerelease=$prerelease"
          } >> "$GITHUB_OUTPUT"

  android:
    name: Build Android APK
    needs: metadata
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.1
      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.0.0
        with:
          node-version: 22.18.0
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm --filter syncer-mobile... install --frozen-lockfile
      - name: Build shared protocol
        run: pnpm --filter @syncer/protocol build
      - name: Generate Android project
        env:
          SYNCER_RELEASE_CHANNEL: ${{ needs.metadata.outputs.release_channel }}
        run: pnpm --filter syncer-mobile exec expo prebuild --clean --platform android --no-install
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.0.0
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2
        with:
          cache-read-only: true

      - name: Prepare Android production release keystore
        if: needs.metadata.outputs.release_channel == 'production'
        shell: bash
        env:
          SYNCER_ANDROID_KEYSTORE_BASE64: ${{ secrets.SYNCER_ANDROID_PRODUCTION_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          if [[ -z "$SYNCER_ANDROID_KEYSTORE_BASE64" ]]; then
            echo 'Missing GitHub Actions secret: SYNCER_ANDROID_PRODUCTION_KEYSTORE_BASE64' >&2
            exit 1
          fi

          keystore_path="$RUNNER_TEMP/syncer-production-release.jks"
          printf '%s' "$SYNCER_ANDROID_KEYSTORE_BASE64" | base64 --decode > "$keystore_path"
          chmod 600 "$keystore_path"
          echo "SYNCER_ANDROID_KEYSTORE_FILE=$keystore_path" >> "$GITHUB_ENV"

      - name: Prepare Android beta release keystore
        if: needs.metadata.outputs.release_channel == 'beta'
        shell: bash
        env:
          SYNCER_ANDROID_KEYSTORE_BASE64: ${{ secrets.SYNCER_ANDROID_BETA_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          if [[ -z "$SYNCER_ANDROID_KEYSTORE_BASE64" ]]; then
            echo 'Missing GitHub Actions secret: SYNCER_ANDROID_BETA_KEYSTORE_BASE64' >&2
            exit 1
          fi

          keystore_path="$RUNNER_TEMP/syncer-beta-release.jks"
          printf '%s' "$SYNCER_ANDROID_KEYSTORE_BASE64" | base64 --decode > "$keystore_path"
          chmod 600 "$keystore_path"
          echo "SYNCER_ANDROID_KEYSTORE_FILE=$keystore_path" >> "$GITHUB_ENV"

      - name: Build Android production release APK
        if: needs.metadata.outputs.release_channel == 'production'
        working-directory: syncer-mobile/android
        shell: bash
        env:
          NODE_ENV: production
          SYNCER_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.SYNCER_ANDROID_PRODUCTION_KEYSTORE_PASSWORD }}
          SYNCER_ANDROID_KEY_ALIAS: ${{ secrets.SYNCER_ANDROID_PRODUCTION_KEY_ALIAS }}
          SYNCER_ANDROID_KEY_PASSWORD: ${{ secrets.SYNCER_ANDROID_PRODUCTION_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --no-daemon --build-cache

      - name: Build Android beta release APK
        if: needs.metadata.outputs.release_channel == 'beta'
        working-directory: syncer-mobile/android
        shell: bash
        env:
          NODE_ENV: production
          SYNCER_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.SYNCER_ANDROID_BETA_KEYSTORE_PASSWORD }}
          SYNCER_ANDROID_KEY_ALIAS: ${{ secrets.SYNCER_ANDROID_BETA_KEY_ALIAS }}
          SYNCER_ANDROID_KEY_PASSWORD: ${{ secrets.SYNCER_ANDROID_BETA_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --no-daemon --build-cache

      - id: apk
        name: Collect Android APK
        shell: bash
        env:
          VERSION: ${{ needs.metadata.outputs.version }}
        run: |
          set -euo pipefail
          source_path="syncer-mobile/android/app/build/outputs/apk/release/app-release.apk"
          artifact_path="$RUNNER_TEMP/Syncer-$VERSION-android.apk"
          test -f "$source_path"
          cp "$source_path" "$artifact_path"
          echo "path=$artifact_path" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: syncer-android-${{ needs.metadata.outputs.version }}
          path: ${{ steps.apk.outputs.path }}
          if-no-files-found: error
          retention-days: 7

  windows:
    name: Build Windows installer
    needs: metadata
    runs-on: windows-2025
    env:
      electron_config_cache: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.1
      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.0.0
        with:
          node-version: 22.18.0
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Restore Electron caches
        uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            ${{ env.electron_config_cache }}
            ${{ env.ELECTRON_BUILDER_CACHE }}
          key: electron-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('pnpm-lock.yaml', 'syncer-desktop/electron-builder.yml', 'syncer-desktop/electron-builder.config.cjs') }}
          restore-keys: |
            electron-${{ runner.os }}-${{ runner.arch }}-

      - name: Install dependencies
        run: pnpm --filter syncer-desktop... install --frozen-lockfile
      - name: Build shared protocol
        run: pnpm --filter @syncer/protocol build
      - name: Build Windows production installer
        run: pnpm --filter syncer-desktop build:win

      - id: installer
        name: Collect Windows installer
        shell: pwsh
        env:
          VERSION: ${{ needs.metadata.outputs.version }}
        run: |
          $sourcePath = Join-Path $PWD "syncer-desktop\dist\syncer-desktop-$env:VERSION-setup.exe"
          $artifactPath = Join-Path $env:RUNNER_TEMP "Syncer-$env:VERSION-windows.exe"
          if (-not (Test-Path -LiteralPath $sourcePath -PathType Leaf)) {
            throw "Windows installer not found: $sourcePath"
          }
          Copy-Item -LiteralPath $sourcePath -Destination $artifactPath
          "path=$artifactPath" >> $env:GITHUB_OUTPUT

      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: syncer-windows-${{ needs.metadata.outputs.version }}
          path: ${{ steps.installer.outputs.path }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: [metadata, android, windows]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          pattern: syncer-*
          path: release-assets
          merge-multiple: true

      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PRERELEASE: ${{ needs.metadata.outputs.prerelease }}
        run: |
          set -euo pipefail
          mapfile -d '' assets < <(find release-assets -maxdepth 1 -type f -print0 | sort -z)
          if [[ "${#assets[@]}" -ne 2 ]]; then
            echo "Expected 2 release assets, found ${#assets[@]}" >&2
            exit 1
          fi

          args=(--verify-tag --generate-notes --title "Syncer $GITHUB_REF_NAME")
          if [[ "$PRERELEASE" == 'true' ]]; then
            args+=(--prerelease --latest=false)
          else
            args+=(--latest)
          fi

          gh release create "$GITHUB_REF_NAME" "${assets[@]}" "${args[@]}"
